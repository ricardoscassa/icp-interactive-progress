name: Adaptive colour recognition CI

on:
  push:
    branches:
      - experiment/adaptive-colour-room-detection
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
      - name: Install dependencies
        run: npm install
      - name: Verify TypeScript, tests and build
        run: npm run verify
