name: Adaptive colour recognition CI

on:
  push:
    branches:
      - experiment/adaptive-colour-room-detection
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
      - name: Install dependencies
        run: npm install
      - name: Verify TypeScript, tests and build
        id: verify
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run verify 2>&1 | tee verify.log
      - name: Upload verification log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: adaptive-colour-verify-log
          path: verify.log
          if-no-files-found: error
      - name: Fail when verification failed
        if: steps.verify.outcome == 'failure'
        run: exit 1
